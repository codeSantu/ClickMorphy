name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/assets/logo-full.png
          test -f dist/assets/logo-icon.png
          ls dist/assets/*.css
          grep -q 'rel="stylesheet"' dist/index.html
          ! grep -q 'src/main.js' dist/index.html
          echo "Build verified"

      - name: Copy build to docs/
        run: |
          rm -rf docs
          cp -r dist docs
          touch docs/.nojekyll

      - name: Deploy docs/ to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs -f
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "deploy: update GitHub Pages site [skip ci]"
          git push
